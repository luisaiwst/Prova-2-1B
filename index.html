<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciador de Atividades</title>
    <link href="style.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar d-flex justify-content-center">GERENCIADOR DE ATIVIDADES</nav>
    <div class="container mt-4">

        <div class="container">

            <div class="row mb-3">

                <div class="col-6">
                    <div class="form">
                        <h5>ADICIONAR ATIVIDADE</h5>

                        <form id="form-todo">
                            <div class="form-input">
                                <input class="form-input-text" placeholder="Atividade" name="atividade" required>

                                <select class="form-input-select" name="classificacao" required>
                                    <option class="form-input-select-disabled" disabled selected value="">Classificação
                                    </option>
                                    <option>Acadêmica</option>
                                    <option>Doméstica</option>
                                    <option>Física</option>
                                    <option>Lazer</option>
                                </select>

                                <div class="d-flex gap-2">
                                    <input type="date" class="form-input-date" id="inputData" name="data" required>
                                    <button class="button-save" type="submit">Salvar</button>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>

                <div class="col-6">
                    <div class="graph d-flex justify-content-center align-items-center">
                        <div id="graficoPrincipal"></div>
                    </div>
                </div>

            </div>

            <div class="row mb-3 text-center">
                <div class="col">
                    <div class="box-status box-status-open" id="pendente">PENDENTES: 2</div>
                </div>
                <div class="col">
                    <div class="box-status box-status-finished" id="finalizado">FINALIZADAS: 0</div>
                </div>
                <div class="col">
                    <div class="box-status box-status-total" id="total">TOTAL: 2</div>
                </div>
            </div>

            <div class="form-search mb-3">
                <h5>FILTRO DE ATIVIDADES</h5>

                <div class="row px-3">
                    <div class="col-6">
                        <select class="form-input-select" id="filtroTipo">
                            <option value="todos">Todos</option>
                            <option value="Acadêmica">Acadêmica</option>
                            <option value="Doméstica">Doméstica</option>
                            <option value="Física">Física</option>
                            <option value="Lazer">Lazer/Recreativa</option>
                        </select>
                    </div>

                    <div class="col-6 d-flex align-items-center">
                        <div class="box-checks">
                            <label><input type="checkbox" id="filtroPendentes"> Pendentes</label>
                            <label><input type="checkbox" id="filtroFinalizadas"> Finalizadas</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box-table">
                <table class="table table-striped text-table">
                    <thead>
                        <tr>
                            <th>Atividade</th>
                            <th>Classificação</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela">

                    </tbody>
                </table>
            </div>

        </div>
        <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <script src="script.js"></script>
</body>

</html>
